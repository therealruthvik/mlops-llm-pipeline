apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/therealruthvik/mlops-llm-pipeline.git
    targetRevision: main
    path: infra/helm/inference-server
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
