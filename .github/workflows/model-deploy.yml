name: Model Promotion Pipeline

on:
  # Manually trigger or call from training job via repository_dispatch
  workflow_dispatch:
    inputs:
      model_version:
        description: 'MLflow model version to promote'
        required: true
  repository_dispatch:
    types: [model-promoted]

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mlflow boto3 pyyaml

      - name: Get latest Production model version
        id: model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python - <<'PYEOF'
          import mlflow, os
          from mlflow.tracking import MlflowClient
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = MlflowClient()
          versions = client.get_latest_versions("llm-chatbot", stages=["Production"])
          v = versions[0].version
          print(f"Production model version: {v}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={v}\n")
              f.write(f"image_tag=v2.{v}\n")
          PYEOF

      - name: Update values.yaml
        run: |
          python - <<'PYEOF'
          import yaml
          with open("infra/helm/inference-server/values.yaml") as f:
              values = yaml.safe_load(f)
          values["image"]["tag"] = "${{ steps.model.outputs.image_tag }}"
          values["model"]["version"] = "${{ steps.model.outputs.version }}"
          with open("infra/helm/inference-server/values.yaml", "w") as f:
              yaml.dump(values, f, default_flow_style=False)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/inference-server/values.yaml
          git commit -m "ci: promote model v${{ steps.model.outputs.version }} [image=${{ steps.model.outputs.image_tag }}]"
          git push
